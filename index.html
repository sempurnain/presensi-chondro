    <style>
        :root {
            --primary: #facc15; /* Yellow/Gold */
            --bg-dark: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(250, 204, 21, 0.04) 0%, transparent 40%);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(250, 204, 21, 0.25);
        }

        .tab-active {
            color: var(--primary);
            position: relative;
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-view { animation: slideUp 0.6s ease-out forwards; }
    </style>
</head>

                <!-- Photo -->

                    <div id="photoContainer" onclick="document.getElementById('fileInput').click()"

    </main>

        // --- CORE LOGIC ---
        let currentImgBase64 = "";
        
        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); updateClock();

        function switchTab(tab) {
            ['presensi', 'statistik'].forEach(t => {
                document.getElementById('section-' + t).classList.add('hidden');
                document.getElementById('btn-' + t).classList.remove('tab-active');
            });
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('tab-active');
            if(tab === 'statistik') renderAllCharts();
        }

        const nameSearch = document.getElementById('nameSearch');
        const dropdown = document.getElementById('dropdownList');
        const preview = document.getElementById('selectionPreview');

        nameSearch.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            dropdown.innerHTML = '';
            if (val.length < 1) { dropdown.classList.add('hidden'); return; }
            const filtered = members.filter(m => m.n.toLowerCase().includes(val));
            if (filtered.length > 0) {
                dropdown.classList.remove('hidden');
                filtered.forEach(m => {
                    const div = document.createElement('div');
                    div.className = "p-4 hover:bg-white/5 cursor-pointer border-b border-white/5 last:border-0";
                    div.innerHTML = `<div class='text-sm font-bold'>${m.n}</div><div class='text-[9px] text-yellow-500 font-bold uppercase'>${m.j} • ${m.b}</div>`;
                    div.onclick = () => {
                        document.getElementById('finalName').value = m.n;
                        document.getElementById('finalJabatan').value = m.j;
                        document.getElementById('finalBiro').value = m.b;
                        document.getElementById('displayName').textContent = m.n;
                        document.getElementById('displayDetails').textContent = `${m.j} | ${m.b}`;
                        document.getElementById('initialName').textContent = m.n.charAt(0);
                        nameSearch.value = ""; dropdown.classList.add('hidden'); preview.classList.remove('hidden');
                    };
                    dropdown.appendChild(div);
                });
            }
        });

        function clearSelection() { preview.classList.add('hidden'); document.getElementById('finalName').value = ""; }

        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImgBase64 = e.target.result.split(',')[1];
                    const p = document.getElementById('previewImg');
                    p.src = e.target.result; p.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('attendanceForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!document.getElementById('finalName').value || !currentImgBase64) return alert("Pilih nama & ambil foto!");
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = "MENGIRIM...";

            const payload = {
                nama: document.getElementById('finalName').value,
                jabatan: document.getElementById('finalJabatan').value,
                biro: document.getElementById('finalBiro').value,
                tipe: "Stand Sore",
                keterangan: e.target.keterangan.value,
                foto: currentImgBase64,
                sheetId: CONFIG.sheetId,
                folderId: CONFIG.folderId
            };

            try {
                await fetch(CONFIG.url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('toast').textContent = "PRESENSI BERHASIL!";
                document.getElementById('toast').classList.remove('hidden');
                setTimeout(() => document.getElementById('toast').classList.add('hidden'), 3000);
                e.target.reset(); clearSelection();
                document.getElementById('previewImg').classList.add('hidden');
                currentImgBase64 = "";
            } catch (err) { alert("Gagal!"); }
            finally { btn.disabled = false; btn.textContent = "KIRIM PRESENSI"; }
        };

        // --- CHARTS ---
        function createChart(id, type, labels, data, title) {
            const ctx = document.getElementById(id).getContext('2d');
            new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#facc15', '#3b82f6', '#ef4444', '#10b981', '#a855f7', '#f97316', '#06b6d4'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#888', font: { size: 9 }, usePointStyle: true } },
                        title: { display: true, text: title.toUpperCase(), color: '#fff', font: { size: 11, weight: 'bold' } }
                    }
                }
            });
        }

        function renderAllCharts() {
            // Placeholder data - in real scenario, this would be fetched from Sheet
            createChart('chartBPH', 'doughnut', ['Hadir', 'Absen'], [75, 25], 'BPH Rayon');

            createChart('chartLSO', 'polarArea', ['Alam', 'Tukul', 'Jurlit', 'Entrep', 'Sport'], [18, 12, 10, 14, 20], 'Kehadiran LSO');
            createChart('chartBSO', 'pie', ['BPH Kopri', 'Internal', 'Eksternal'], [40, 30, 30], 'BSO KOPRI');
