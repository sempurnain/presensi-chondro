    <style>
        :root {
            --primary: #facc15; 
            --bg-dark: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(250, 204, 21, 0.04) 0%, transparent 40%);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            appearance: none;
        }

        .input-field:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(250, 204, 21, 0.25);
        }

        .tab-active {
            color: var(--primary);
            position: relative;
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
        }

        optgroup {
            background: #1a1a1a;
            color: #facc15;
            font-weight: bold;
        }

        option {
            background: #0a0a0c;
            color: white;
            font-weight: normal;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-view { animation: slideUp 0.6s ease-out forwards; }
    </style>
</head>

        let currentImgBase64 = "";

        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); updateClock();

        function switchTab(tab) {
            ['presensi', 'statistik'].forEach(t => {
                document.getElementById('section-' + t).classList.add('hidden');
                document.getElementById('btn-' + t).classList.remove('tab-active');
            });
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('tab-active');
            if(tab === 'statistik') renderAllCharts();
        }

        const nameSearch = document.getElementById('nameSearch');
        const dropdown = document.getElementById('dropdownList');
        const preview = document.getElementById('selectionPreview');

        nameSearch.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            dropdown.innerHTML = '';
            if (val.length < 1) { dropdown.classList.add('hidden'); return; }
            const filtered = members.filter(m => m.n.toLowerCase().includes(val));
            if (filtered.length > 0) {
                dropdown.classList.remove('hidden');
                filtered.forEach(m => {
                    const div = document.createElement('div');
                    div.className = "p-4 hover:bg-white/5 cursor-pointer border-b border-white/5 last:border-0 transition-all";
                    div.innerHTML = `<div class='text-sm font-bold'>${m.n}</div><div class='text-[9px] text-yellow-500 font-bold uppercase'>${m.j} • ${m.b}</div>`;
                    div.onclick = () => {
                        document.getElementById('finalName').value = m.n;
                        document.getElementById('finalJabatan').value = m.j;
                        document.getElementById('finalBiro').value = m.b;
                        document.getElementById('displayName').textContent = m.n;
                        document.getElementById('displayDetails').textContent = `${m.j} | ${m.b}`;
                        document.getElementById('initialName').textContent = m.n.charAt(0);
                        nameSearch.value = ""; dropdown.classList.add('hidden'); preview.classList.remove('hidden');
                    };
                    dropdown.appendChild(div);
                });
            }
        });

        function clearSelection() { preview.classList.add('hidden'); document.getElementById('finalName').value = ""; }

        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImgBase64 = e.target.result.split(',')[1];
                    document.getElementById('previewImg').src = e.target.result;
                    document.getElementById('previewImg').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('attendanceForm').onsubmit = async (e) => {
            e.preventDefault();
            const agenda = document.getElementById('agendaLembaga').value;
            if(!document.getElementById('finalName').value || !currentImgBase64 || !agenda) {
                alert("Harap isi Nama, Pilih Agenda Lembaga, dan Ambil Foto!");
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = "MENGIRIM...";

            const payload = {
                nama: document.getElementById('finalName').value,
                jabatan: document.getElementById('finalJabatan').value,
                biro: document.getElementById('finalBiro').value,
                tipe: "Stand Sore - " + agenda,
                keterangan: document.getElementById('keterangan').value,
                foto: currentImgBase64,
                sheetId: CONFIG.sheetId,
                folderId: CONFIG.folderId
            };

            try {
                await fetch(CONFIG.url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                const toast = document.getElementById('toast');
                toast.textContent = "PRESENSI BERHASIL TERKIRIM!";
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 3000);
                e.target.reset(); clearSelection();
                document.getElementById('previewImg').classList.add('hidden');
                currentImgBase64 = "";
            } catch (err) { alert("Gagal mengirim data!"); }
            finally { btn.disabled = false; btn.textContent = "KIRIM PRESENSI"; }
        };

        function renderAllCharts() {
            const chartConfigs = [
                { id: 'chartBPH', type: 'doughnut', labels: ['Hadir', 'Absen'], data: [80, 20], title: 'BPH Rayon' },
                { id: 'chartBiros', type: 'bar', labels: ['Kader', 'Gerakan', 'Media', 'Intelek', 'Agama'], data: [15, 12, 18, 10, 14], title: 'Presensi Biro' },
                { id: 'chartLSO', type: 'polarArea', labels: ['Alam', 'Tukul', 'Jurlit', 'Entrep', 'Sport'], data: [12, 19, 10, 15, 22], title: 'Lembaga Semi Otonom' },
                { id: 'chartBSO', type: 'pie', labels: ['BPH', 'Internal', 'Eksternal'], data: [30, 45, 25], title: 'BSO KOPRI' }
            ];

            chartConfigs.forEach(conf => {
                const ctx = document.getElementById(conf.id).getContext('2d');
                new Chart(ctx, {
                    type: conf.type,
                    data: {
                        labels: conf.labels,
                        datasets: [{ data: conf.data, backgroundColor: ['#facc15', '#3b82f6', '#ef4444', '#10b981', '#a855f7'], borderWidth: 0 }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom', labels: { color: '#888', font: { size: 9 }, usePointStyle: true } },
                            title: { display: true, text: conf.title.toUpperCase(), color: '#fff', font: { size: 11, weight: 'bold' } }
                        }
                    }
                });
            });
        }
    </script>
</body>
