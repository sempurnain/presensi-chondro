    <style>
        :root {
            --primary: #facc15; /* Gold Accent */
            --bg-dark: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(30, 58, 138, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(250, 204, 21, 0.03) 0%, transparent 40%);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            outline: none;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            font-weight: 700;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(250, 204, 21, 0.25);
        }

        .tab-active {
            color: var(--primary);
            position: relative;
        }

        .tab-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-view { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>

                    <label class="cursor-pointer">

            {n: "Vina Rosalia Khoiroh", j: "Anggota", b: "Biro Eksternal KOPRI"},
            {n: "Manzilatul Hikmiah", j: "Anggota", b: "Biro Eksternal KOPRI"},
            {n: "Salsabila Arsyis Tawa Harviansyah", j: "Anggota", b: "Biro Eksternal KOPRI"}
        ];

        // --- STATE & UTILS ---
        let currentImgBase64 = "";
        
        function updateClock() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' };
            document.getElementById('digital-clock').textContent = now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateClock, 1000); updateClock();

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        // --- TAB LOGIC ---
        function switchTab(tab) {
            ['presensi', 'statistik', 'admin'].forEach(t => {
                document.getElementById('section-' + t).classList.add('hidden');
                document.getElementById('btn-' + t).classList.remove('tab-active');
                document.getElementById('btn-' + t).classList.add('text-gray-500');
            });
            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('tab-active');
            if(tab === 'statistik') renderChart();
        }

        // --- SEARCHABLE DROPDOWN LOGIC ---
        const nameSearch = document.getElementById('nameSearch');
        const dropdown = document.getElementById('dropdownList');
        const preview = document.getElementById('selectionPreview');

        nameSearch.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            dropdown.innerHTML = '';
            if (val.length < 1) { dropdown.classList.add('hidden'); return; }
            
            const filtered = members.filter(m => m.n.toLowerCase().includes(val));
            if (filtered.length > 0) {
                dropdown.classList.remove('hidden');
                filtered.forEach(m => {
                    const div = document.createElement('div');
                    div.className = "p-4 hover:bg-white/5 cursor-pointer border-b border-white/5 last:border-0 transition-all";
                    div.innerHTML = `
                        <div class="text-sm font-bold text-white">${m.n}</div>
                        <div class="text-[9px] font-bold text-yellow-500 uppercase tracking-wider">${m.j} • ${m.b}</div>
                    `;
                    div.onclick = () => selectMember(m);
                    dropdown.appendChild(div);
                });
            } else {
                dropdown.classList.add('hidden');
            }
        });

        function selectMember(m) {
            document.getElementById('finalName').value = m.n;
            document.getElementById('finalJabatan').value = m.j;
            document.getElementById('finalBiro').value = m.b;
            
            document.getElementById('displayName').textContent = m.n;
            document.getElementById('displayDetails').textContent = `${m.j} | ${m.b}`;
            document.getElementById('initialName').textContent = m.n.charAt(0);
            
            nameSearch.value = "";
            dropdown.classList.add('hidden');
            preview.classList.remove('hidden');
        }

        function clearSelection() {
            preview.classList.add('hidden');
            document.getElementById('finalName').value = "";
        }

        // --- PHOTO LOGIC ---
        function handleImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentImgBase64 = e.target.result.split(',')[1];
                    const prev = document.getElementById('previewImg');
                    prev.src = e.target.result;
                    prev.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        // --- FORM SUBMIT (TO GOOGLE APPS SCRIPT) ---
        document.getElementById('attendanceForm').onsubmit = async (e) => {
            e.preventDefault();
            const url = localStorage.getItem('gas_url');
            if(!url) return showToast("Script URL belum diset di tab admin!");
            if(!document.getElementById('finalName').value) return showToast("Pilih nama Anda!");
            if(!currentImgBase64) return showToast("Wajib unggah foto bukti!");

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = "MEMPROSES...";

            const payload = {
                nama: document.getElementById('finalName').value,
                jabatan: document.getElementById('finalJabatan').value,
                biro: document.getElementById('finalBiro').value,
                tipe: e.target.type.value === 'Acara' ? (localStorage.getItem('gas_event') || 'Kegiatan') : 'Stand Sore',
                keterangan: e.target.keterangan.value,
                foto: currentImgBase64,
                sheetId: localStorage.getItem('gas_sheet'),
                folderId: localStorage.getItem('gas_folder')
            };

            try {
                await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                showToast("Presensi Berhasil Dikirim");
                e.target.reset();
                document.getElementById('previewImg').classList.add('hidden');
                clearSelection();
                currentImgBase64 = "";
            } catch (err) {
                showToast("Gagal mengirim data");
            } finally {
                btn.disabled = false; btn.textContent = "KIRIM DATA KEHADIRAN";
            }
        };

        // --- ADMIN SETTINGS ---
        function saveAdmin() {
            localStorage.setItem('gas_url', document.getElementById('adminScriptUrl').value);
            localStorage.setItem('gas_sheet', document.getElementById('adminSheetId').value);
            localStorage.setItem('gas_folder', document.getElementById('adminFolderId').value);
            localStorage.setItem('gas_event', document.getElementById('adminEventName').value);
            showToast("Konfigurasi Diperbarui");
        }

        window.onload = () => {
            document.getElementById('adminScriptUrl').value = localStorage.getItem('gas_url') || '';
            document.getElementById('adminSheetId').value = localStorage.getItem('gas_sheet') || '';
            document.getElementById('adminFolderId').value = localStorage.getItem('gas_folder') || '';
            document.getElementById('adminEventName').value = localStorage.getItem('gas_event') || '';
        };

        // --- STATS CHART ---
        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['S', 'S', 'R', 'K', 'J', 'S', 'M'],
                    datasets: [{
                        data: [20, 45, 30, 60, 40, 85, 50],
                        borderColor: '#facc15',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(250, 204, 21, 0.05)',
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: '#444', font: { size: 9, weight: 'bold' } } }
                    }
                }
            });
        }
    </script>
</body>
</html>
